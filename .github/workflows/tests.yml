name: Test
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
            ~/.cache/pip/
            .mypy_cache
          key: ${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/pyproject.toml') }}
      - name: Install Hatch
        uses: pypa/hatch@install
      - name: Check types with mypy
        run: hatch run types:check
  test:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
            ~/.cache/pip/
            .mypy_cache
          key: ${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/pyproject.toml') }}
      - name: Install Hatch
        uses: pypa/hatch@install
      - name: Run tests
        run: hatch test
