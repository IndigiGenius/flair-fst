name: "Cache All The Things"
description: "Cache Pip, Cargo, and MYPY"
runs:
   using: "composite"
   steps:
    - uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
          ~/.cache/pip/
          .mypy_cache
        key: ${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/pyproject.toml') }}
